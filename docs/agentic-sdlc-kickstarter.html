document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;

    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }

ntent: ''; width: 3px; height: 14px; background: var(--teal); border-radius: 2px; flex-shrink: 0; }\n.card-body { font-size: .78rem; color: var(--gray-600); line-height: 1.55; }\n.card-body ul { padding-left: 1.1rem; }\n.card-body code { font-size: .75rem; background: var(--gray-100); padding: .05rem .3rem; border-radius: 3px; }\n\n/* ---- GRIDS ---- */\n.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1rem; }\n.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }\n.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; }\n.grid-5 { display: grid; grid-template-columns: repeat(5, 1fr); gap: .75rem; }\n@media (max-width: 1100px) { .grid-5 { grid-template-columns: repeat(3, 1fr); } .grid-4 { grid-template-columns: repeat(2, 1fr); } }\n@media (max-width: 800px) {\n  .grid-2, .grid-3, .grid-4, .grid-5 { grid-template-columns: 1fr; }\n  .tab-panel { padding: 1rem; } .site-header { padding: 0 1rem; } .tab-nav { padding: 0 1rem; }\n}\n\n/* ---- FLOW ROWS ---- */\n.flow-row { display: flex; align-items: center; gap: .5rem; flex-wrap: wrap; }\n.arrow-right { color: var(--teal); font-size: 1rem; flex-shrink: 0; }\n.arrow-down { display: flex; justify-content: center; color: var(--teal); font-size: 1rem; margin: .25rem 0; }\n\n/* ---- MODULE GRID ---- */\n.module-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: .5rem; }\n.module-chip { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: .5rem .75rem; font-size: .72rem; font-weight: 600; color: var(--gray-700); text-align: center; box-shadow: var(--shadow-sm); }\n\n/* ---- STAT BAND ---- */\n.stat-band { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: .75rem; margin-bottom: 1.5rem; }\n.stat-item { background: #fff; border: 1px solid var(--gray-200); border-radius: var(--radius); padding: .85rem 1rem; text-align: center; box-shadow: var(--shadow-sm); }\n.stat-value { font-size: 1.5rem; font-weight: 800; color: var(--teal); line-height: 1; }\n.stat-label { font-size: .7rem; color: var(--gray-600); margin-top: .25rem; font-weight: 500; }\n\n/* ---- TABLE ---- */\n.data-table { width: 100%; border-collapse: collapse; font-size: .78rem; background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }\n.data-table th { background: var(--gray-800); color: #fff; padding: .6rem .85rem; text-align: left; font-weight: 600; font-size: .72rem; letter-spacing: .3px; text-transform: uppercase; }\n.data-table td { padding: .55rem .85rem; border-bottom: 1px solid var(--gray-100); color: var(--gray-700); vertical-align: top; }\n.data-table tr:last-child td { border-bottom: none; }\n.data-table tr:nth-child(even) td { background: var(--gray-50); }\n.data-table code { font-size: .74rem; }\n\n/* ---- NOTE BOX ---- */\n.note-box { background: var(--teal-pale); border-left: 4px solid var(--teal); border-radius: 0 var(--radius) var(--radius) 0; padding: .75rem 1rem; font-size: .78rem; color: var(--teal-dim); margin-bottom: 1rem; }\n.note-box code { background: rgba(255,255,255,.6); padding: .05rem .3rem; border-radius: 3px; }\n.warn-box { background: var(--amber-pale); border-left: 4px solid var(--amber); border-radius: 0 var(--radius) var(--radius) 0; padding: .75rem 1rem; font-size: .78rem; color: var(--amber); margin-bottom: 1rem; }\n\n/* ---- TIER TABLE ---- */\n.tier-table { width: 100%; border-collapse: collapse; font-size: .77rem; background: #fff; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); margin-bottom: 1rem; }\n.tier-table th { background: var(--teal-dim); color: #fff; padding: .55rem .75rem; text-align: left; font-weight: 600; font-size: .7rem; letter-spacing: .3px; text-transform: uppercase; }\n.tier-table td { padding: .5rem .75rem; border-bottom: 1px solid var(--gray-100); vertical-align: top; }\n.tier-table tr:last-child td { border-bottom: none; }\n\n/* ---- MODAL ---- */\n.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 1000; align-items: center; justify-content: center; }\n.modal-overlay.open { display: flex; }\n.modal-box { background: #fff; border-radius: 10px; padding: 2rem; max-width: 580px; width: 90%; max-height: 80vh; overflow-y: auto; box-shadow: var(--shadow-lg); position: relative; }\n.modal-title { font-size: 1.05rem; font-weight: 700; color: var(--gray-900); margin-bottom: 1rem; padding-bottom: .75rem; border-bottom: 2px solid var(--teal); }\n.modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; font-size: 1.2rem; cursor: pointer; color: var(--gray-600); line-height: 1; padding: .25rem; }\n.modal-close:hover { color: var(--gray-900); }\n.release-entry { margin-bottom: 1rem; }\n.release-version { font-weight: 700; font-size: .85rem; color: var(--teal-dim); margin-bottom: .35rem; }\n.release-list { padding-left: 1.2rem; font-size: .8rem; color: var(--gray-700); line-height: 1.7; }\n\n/* ---- AUTONOMY LADDER ---- */\n.ladder { display: grid; gap: .5rem; }\n.ladder-row { display: grid; grid-template-columns: 92px 1fr; gap: .85rem; align-items: stretch; }\n.ladder-level { display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: var(--radius); color: #fff; font-weight: 800; padding: .5rem; text-align: center; line-height: 1.1; }\n.ladder-body { background: #fff; border: 1px solid var(--gray-200); border-left: 4px solid var(--teal); border-radius: var(--radius); padding: .65rem .85rem; box-shadow: var(--shadow-sm); }\n.ladder-name { font-size: .82rem; font-weight: 700; color: var(--gray-800); }\n.ladder-desc { font-size: .76rem; color: var(--gray-600); margin-top: .15rem; }\n\n/* ---- PRINT ---- */\n@media print {\n  .site-header, .tab-nav { position: static; }\n  .tab-panel { display: block !important; page-break-before: always; }\n  .tab-panel:first-child { page-break-before: avoid; }\n  .modal-overlay { display: none !important; }\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<!-- ========================================================\n     HEADER\n     ======================================================== -->\n<header class=\"site-header\">\n  <div class=\"header-brand\">\n    <div class=\"logo-mark\">AK<\u002Fdiv>\n    <div>\n      <div class=\"brand-name\">Agentic SDLC Kickstarter<\u002Fdiv>\n      <div class=\"brand-sub\">A vendor-neutral accelerator for AI-led software delivery<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"header-badges\">\n    <span class=\"badge badge-version\">v1.0.0<\u002Fspan>\n    <span class=\"badge badge-wave\">Reference Blueprint<\u002Fspan>\n    <a class=\"badge badge-link\" onclick=\"document.getElementById('modal-release').classList.add('open')\">What’s New<\u002Fa>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ========================================================\n     TAB NAV\n     ======================================================== -->\n<nav class=\"tab-nav\" role=\"tablist\" aria-label=\"Kickstarter views\">\n  <button class=\"tab-btn active\" role=\"tab\" aria-selected=\"true\" aria-controls=\"panel-0\" onclick=\"switchTab(0)\">Overview<\u002Fbutton>\n  <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" aria-controls=\"panel-1\" onclick=\"switchTab(1)\">AI-Led SDLC<\u002Fbutton>\n  <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" aria-controls=\"panel-2\" onclick=\"switchTab(2)\">Agentic System<\u002Fbutton>\n  <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" aria-controls=\"panel-3\" onclick=\"switchTab(3)\">DevSecOps<\u002Fbutton>\n  <button class=\"tab-btn\" role=\"tab\" aria-selected=\"false\" aria-controls=\"panel-4\" onclick=\"switchTab(4)\">Development<\u002Fbutton>\n<\u002Fnav>\n\n<!-- ========================================================\n     PANEL 0: OVERVIEW\n     ======================================================== -->\n<section class=\"tab-panel active\" id=\"panel-0\" role=\"tabpanel\">\n  <div class=\"section-header\">\n    <div class=\"section-title\">Agentic SDLC Kickstarter<\u002Fdiv>\n    <div class=\"section-sub\">Clone → configure → ship. A drop-in agentic operating system that puts <strong>80% of the software lifecycle under autonomous agents<\u002Fstrong> and reserves <strong>20% for human judgement<\u002Fstrong> — runtime-, model-, and stack-agnostic.<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"stat-band\">\n    <div class=\"stat-item\"><div class=\"stat-value\">5<\u002Fdiv><div class=\"stat-label\">Architecture layers<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"stat-value\">80/20<\u002Fdiv><div class=\"stat-label\">AI / human split<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"stat-value\">L0–L4<\u002Fdiv><div class=\"stat-label\">Autonomy ladder<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"stat-value\">5<\u002Fdiv><div class=\"stat-label\">Promotion gates<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"stat-value\">100%<\u002Fdiv><div class=\"stat-label\">Eval pass to ship<\u002Fdiv><\u002Fdiv>\n    <div class=\"stat-item\"><div class=\"stat-value\">~10×<\u002Fdiv><div class=\"stat-label\">Token efficiency<\u002Fdiv><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"note-box\">\n    The Kickstarter is a <strong>starting point, not a framework lock-in<\u002Fstrong>. Everything ships as editable files — agents, skills, slash commands, hooks, rules, policies, and eval suites — that you fork and shape to your domain. It assumes a spec-first workflow and a coding agent CLI (works with the leading agents: Claude Code, Codex, Gemini CLI) but pins to none of them.\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">What’s in the Box — The Five Layers<\u002Fdiv>\n    <div class=\"grid-5\">\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">Spec &amp; Lifecycle<\u002Fdiv>\n        <div class=\"card-body\"><code>SPEC.md<\u002Fcode> as source of truth, requirement artefacts, the 80/20 flow, session &amp; context persistence.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--purple)\">\n        <div class=\"card-title\">Agent Mesh<\u002Fdiv>\n        <div class=\"card-body\">Orchestration agents, pluggable workstream engineers, planner–executor–critic loops, parallel fan-out.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--orange)\">\n        <div class=\"card-title\">Capability Library<\u002Fdiv>\n        <div class=\"card-body\">Skills, slash commands, MCP servers, and a token-efficiency toolbox — invoked by name in any agent.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--red)\">\n        <div class=\"card-title\">Guardrails<\u002Fdiv>\n        <div class=\"card-body\">Hooks, rules engine, policy-as-code, HITL blast-radius tiers, secret &amp; supply-chain controls.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--green)\">\n        <div class=\"card-title\">Assurance<\u002Fdiv>\n        <div class=\"card-body\">Promotion gate matrix, golden + adversarial eval suites, observability, and cost governance.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">The Acceleration Thesis — How This Goes Further<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\">\n        <div class=\"card-title\">Spec-first, not prompt-first<\u002Fdiv>\n        <div class=\"card-body\">A single <code>SPEC.md<\u002Fcode> — scope, data model, contracts, acceptance criteria — is the durable source of truth. Issues and tasks derive from it; agents build from it; gates verify against it. The spec is the program.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Plan → Execute → Critique<\u002Fdiv>\n        <div class=\"card-body\">Every unit of work runs a closed loop: a planner proposes, an executor implements, a critic challenges against acceptance criteria. The loop repeats until green — no human in the inner loop.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Parallel fan-out<\u002Fdiv>\n        <div class=\"card-body\">The orchestrator decomposes a spec into independent tasks and dispatches workstream agents concurrently. Context packs keep each agent isolated; the release coordinator re-sequences the merges.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Self-improving<\u002Fdiv>\n        <div class=\"card-body\">A continuous-learning loop observes sessions, records atomic instincts with a confidence score, and graduates high-confidence instincts into reusable skills, commands, or agents — velocity compounds sprint over sprint.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Model routing<\u002Fdiv>\n        <div class=\"card-body\">A resolver routes each call to the smallest model that clears the eval bar: a reasoning model for planning and architecture, a fast model for quality gates and coordination. No hard-coded model IDs in product code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Eval-as-gate<\u002Fdiv>\n        <div class=\"card-body\">Agents are software. A golden + adversarial + red-team eval suite is their regression suite, and a 100% pass is a hard promotion gate — the same way unit tests gate application code.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Autonomy Ladder — Dial Up as Trust Compounds<\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-bottom:.75rem\">Autonomy is a <strong>per-task setting<\u002Fstrong>, not a global mode. The Kickstarter ships defaulted to <strong>L2<\u002Fstrong>; higher levels unlock only when a workstream’s eval suite, observability, and HITL controls are proven. The 80/20 split is preserved at every level — what changes is how much of the inner loop runs without a human.<\u002Fdiv>\n    <div class=\"ladder\">\n      <div class=\"ladder-row\">\n        <div class=\"ladder-level\" style=\"background:var(--slate)\">L0<br><span style=\"font-size:.6rem;font-weight:600\">Assist<\u002Fspan><\u002Fdiv>\n        <div class=\"ladder-body\"><div class=\"ladder-name\">Assisted<\u002Fdiv><div class=\"ladder-desc\">Agent suggests; human types and runs everything. Inline completion and review only. No tool execution.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ladder-row\">\n        <div class=\"ladder-level\" style=\"background:var(--teal-light)\">L1<br><span style=\"font-size:.6rem;font-weight:600\">Supervise<\u002Fspan><\u002Fdiv>\n        <div class=\"ladder-body\"><div class=\"ladder-name\">Supervised<\u002Fdiv><div class=\"ladder-desc\">Agent edits and runs read-only / reversible tools, pausing for approval at every step. Human drives the loop.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ladder-row\">\n        <div class=\"ladder-level\" style=\"background:var(--teal)\">L2<br><span style=\"font-size:.6rem;font-weight:600\">Bounded<\u002Fspan><\u002Fdiv>\n        <div class=\"ladder-body\"><div class=\"ladder-name\">Bounded-autonomous &nbsp;<span class=\"chip chip-teal\" style=\"font-size:.6rem\">default<\u002Fspan><\u002Fdiv><div class=\"ladder-desc\">Agent runs the full plan–execute–critique loop unattended within a task; stops at the PR. Human owns plan approval and merge.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ladder-row\">\n        <div class=\"ladder-level\" style=\"background:var(--teal-dim)\">L3<br><span style=\"font-size:.6rem;font-weight:600\">Gated<\u002Fspan><\u002Fdiv>\n        <div class=\"ladder-body\"><div class=\"ladder-name\">Autonomous-with-gates<\u002Fdiv><div class=\"ladder-desc\">Agent fans out across multiple tasks and opens PRs autonomously; promotion gates + eval suite are the control surface. Human handles exceptions and release sign-off.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"ladder-row\">\n        <div class=\"ladder-level\" style=\"background:var(--navy)\">L4<br><span style=\"font-size:.6rem;font-weight:600\">Directed<\u002Fspan><\u002Fdiv>\n        <div class=\"ladder-body\"><div class=\"ladder-name\">Self-directed<\u002Fdiv><div class=\"ladder-desc\">Agent proposes and sequences its own backlog from the spec, subject to budgets, policy-as-code, and circuit breakers. Human sets intent and reviews outcomes.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================================================\n     PANEL 1: AI-LED SDLC\n     ======================================================== -->\n<section class=\"tab-panel\" id=\"panel-1\" role=\"tabpanel\">\n  <div class=\"section-header\">\n    <div class=\"section-title\">AI-Led SDLC<\u002Fdiv>\n    <div class=\"section-sub\">The reinvented delivery lifecycle — spec-first, 80% AI / 20% human, gated end to end. Issue or intent in; verified, deployed software out.<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">The 80 / 20 Responsibility Model<\u002Fdiv>\n    <div class=\"grid-2\">\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">AI Does (80%)<\u002Fdiv>\n        <div class=\"card-body\">\n          <ul style=\"padding-left:1.2rem;line-height:1.8;color:var(--gray-700)\">\n            <li>Read the spec, issue, and linked artefacts; run pre-flight checks<\u002Fli>\n            <li>Spawn the business-analyst agent when no approved requirement exists; block until resolved<\u002Fli>\n            <li>Product-analyst turns intent into an implementation-ready spec with edge cases &amp; a test list<\u002Fli>\n            <li>Architect produces ADRs for cross-stream or contract-altering changes<\u002Fli>\n            <li>Write the implementation plan via the <code>plan-then-code<\u002Fcode> skill<\u002Fli>\n            <li>Workstream engineer implements: code, tests, docs (~80% of diff lines)<\u002Fli>\n            <li>Run the <code>verification-loop<\u002Fcode>: lint, typecheck, tests, secret scan, build<\u002Fli>\n            <li>Spawn code-reviewer + security-reviewer agents for first-pass review<\u002Fli>\n            <li>Docs-writer updates README, CHANGELOG, ADRs, and the requirements traceability matrix<\u002Fli>\n            <li>Open a draft PR via <code>/handoff<\u002Fcode> with a complete description + AI checklist<\u002Fli>\n            <li>Continuous-learning records instincts; graduates them to skills above the confidence threshold<\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--green)\">\n        <div class=\"card-title\">Human Does (20%)<\u002Fdiv>\n        <div class=\"card-body\">\n          <ul style=\"padding-left:1.2rem;line-height:1.8;color:var(--gray-700)\">\n            <li>Approve the requirement artefact (analyst drafts; human signs off)<\u002Fli>\n            <li>Approve the implementation plan before any code is written<\u002Fli>\n            <li>Sign off on architecture decisions — the architect never self-approves<\u002Fli>\n            <li>Run <code>/review-gate<\u002Fcode> on the draft PR: judgement, not mechanics<\u002Fli>\n            <li>Resolve ambiguous requirements with stakeholders<\u002Fli>\n            <li>UAT sign-off at the test→staging gate<\u002Fli>\n            <li>Human security reviewer at test→staging and staging→main<\u002Fli>\n            <li>A named release manager approves staging→main<\u002Fli>\n            <li>Click merge — the agent is mechanically denied <code>merge<\u002Fcode><\u002Fli>\n          <\u002Ful>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:.5rem\">Human gates are enforced by hooks and <code>settings.json<\u002Fcode>, <strong>not by convention<\u002Fstrong>. Bypassing any gate requires an explicit, documented exception.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Spec-First Source of Truth<\u002Fdiv>\n    <div class=\"flow-row\">\n      <div class=\"chip chip-purple\" style=\"padding:.5rem 1rem;font-size:.82rem\">SPEC.md<br><small>scope · data model · contracts · acceptance<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\" style=\"padding:.5rem 1rem;font-size:.82rem\">Requirements<br><small>STORY / FR / NFR<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\" style=\"padding:.5rem 1rem;font-size:.82rem\">Issues<br><small>1 issue ↔ 1 requirement<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\" style=\"padding:.5rem 1rem;font-size:.82rem\">Tasks<br><small>ordered, verifiable units<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-green\" style=\"padding:.5rem 1rem;font-size:.82rem\">PRs<br><small>spec-traceable diff<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:1rem\">Every commit carries a <code>Requirement: &lt;id&gt;<\u002Fcode> trailer and every PR is traceable to a line in the spec. The spec is versioned with the code, diffed in review, and is the artefact the eval and promotion gates verify against — ambiguity is resolved <em>before<\u002Fem> the agent writes a line.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">AI-Led SDLC Flow — Intent to Production<\u002Fdiv>\n\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Phase 1: Intake + Requirements — Orchestrator • Business Analyst • Product Analyst<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">/orchestrate &lt;issue-url&gt;<\u002Fspan>\n        <span class=\"chip chip-teal\">Pre-flight: approved requirement · critical-path · deps satisfied · edge cases enumerated<\u002Fspan>\n        <span class=\"chip chip-teal\">Business-analyst drafts STORY / FR / NFR artefact if missing<\u002Fspan>\n        <span class=\"chip chip-teal\">Product-analyst posts an implementation-ready spec as an issue comment<\u002Fspan>\n        <span class=\"chip chip-teal\">Context pack written to .agent/context-packs/&lt;issue-id&gt;/context.md<\u002Fspan>\n        <span class=\"chip chip-teal\">Scope memories loaded from .agent/scope-memories/<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: approve requirement artefact (status: approved)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"arrow-down\">↓<\u002Fdiv>\n\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Phase 2: Planning — Product Analyst • Architect • plan-then-code skill<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">plan-then-code structures the plan with requirement reference + pre-flight block<\u002Fspan>\n        <span class=\"chip chip-teal\">Architect invoked when a change crosses workstreams, alters a contract, or has security/perf implications<\u002Fspan>\n        <span class=\"chip chip-teal\">ADR written to docs/adr/ and mirrored into the decisions log<\u002Fspan>\n        <span class=\"chip chip-teal\">Reasoning model selected via the model router for planning<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: approve plan before any code is written<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: sign off ADR (architect never self-approves)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"arrow-down\">↓<\u002Fdiv>\n\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Phase 3: Implementation — Workstream Engineers • plan–execute–critique loop<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">Feature branch: issue-&lt;num&gt;-&lt;slug&gt; from dev only<\u002Fspan>\n        <span class=\"chip chip-teal\">Planner → Executor → Critic loop runs unattended to green (L2 default)<\u002Fspan>\n        <span class=\"chip chip-teal\">verification-loop: lint, typecheck, unit tests, BDD scenarios, secret scan, build<\u002Fspan>\n        <span class=\"chip chip-teal\">bdd-workflow drives acceptance criteria as executable scenarios<\u002Fspan>\n        <span class=\"chip chip-teal\">All LLM outputs validated through a typed schema gate (Pydantic / Zod) before any side effect<\u002Fspan>\n        <span class=\"chip chip-teal\">Blast-radius check: Tier 3+ actions require HITL approval before execution<\u002Fspan>\n        <span class=\"chip chip-teal\">Parallel fan-out: independent tasks dispatched concurrently with isolated context packs<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"arrow-down\">↓<\u002Fdiv>\n\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Phase 4: Review + Merge — Code Reviewer • Security Reviewer • Docs Writer • Human<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">/handoff opens a draft PR with a complete description + AI review checklist<\u002Fspan>\n        <span class=\"chip chip-teal\">code-reviewer: silent fallbacks, dead error handling, spurious abstractions, missing tests, AC drift<\u002Fspan>\n        <span class=\"chip chip-teal\">security-reviewer: OWASP top-10, secrets, auth, injection, SSRF, prompt-injection scan<\u002Fspan>\n        <span class=\"chip chip-teal\">docs-writer: README, CHANGELOG, in-code headers, traceability matrix updated<\u002Fspan>\n        <span class=\"chip chip-teal\">/pr-update \"&lt;message&gt;\" iterates on the open PR (re-verify, re-review loop)<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: /review-gate — 20% judgement: architecture, security, business logic, AC completeness<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: click merge (agent mechanically denied merge)<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"arrow-down\">↓<\u002Fdiv>\n\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Phase 5: Promotion + Release — Release Coordinator • QA Engineer • gate matrix<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">/promote dev test — QA reviews coverage; deploy + smoke tests on the test env<\u002Fspan>\n        <span class=\"chip chip-teal\">e2e-testing + visual / contract regression at test→staging<\u002Fspan>\n        <span class=\"chip chip-teal\">accessibility + broken-links + performance budget at test→staging<\u002Fspan>\n        <span class=\"chip chip-teal\">eval-suite: 100% golden + 100% adversarial + red-team pass required<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: UAT sign-off + human security reviewer at staging<\u002Fspan>\n        <span class=\"chip chip-teal\">release-coordinator drafts release notes; sequences cross-repo PRs<\u002Fspan>\n        <span class=\"chip chip-amber\">HUMAN: named release manager approves staging→main<\u002Fspan>\n        <span class=\"chip chip-teal\">Signed, SBOM-attached artefact tagged vN.N.N; production deploy triggered<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Session Lifecycle &amp; Context Persistence (Mandatory)<\u002Fdiv>\n    <div class=\"flow-row\">\n      <div class=\"chip chip-teal\">/session-start &lt;name|issue&gt;<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-slate\">… do work …<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\">/session-update \"&lt;note&gt;\" (after every state change)<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\">/session-end<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:.75rem\">Session files at <code>.agent/sessions/YYYY-MM-DD-HHMM-&lt;workstream&gt;-&lt;slug&gt;.md<\u002Fcode> are the single durable artefact between agent invocations. The <code>session-start<\u002Fcode> hook reads the active session on every new invocation and prints goals, the last 3 updates, and blockers; the <code>stop-session<\u002Fcode> hook nags if <code>/session-end<\u002Fcode> was not run. Context packs carry the issue title, requirement ID, edge cases, dependency status, and approved plan — passed verbatim to subagents (byte-identical prefix preserves the prompt cache).<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Hard Rules — Enforced by Hooks, Settings, and Pre-flight<\u002Fdiv>\n    <div class=\"grid-2\">\n      <div class=\"card\">\n        <div class=\"card-title\">Mechanical Denials (hooks + settings.json)<\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"chips\">\n            <span class=\"chip chip-red\">merge denied to the agent<\u002Fspan>\n            <span class=\"chip chip-red\">git push --force denied<\u002Fspan>\n            <span class=\"chip chip-red\">git reset --hard denied<\u002Fspan>\n            <span class=\"chip chip-red\">commit --no-verify denied<\u002Fspan>\n            <span class=\"chip chip-red\">New source files without a header comment blocked<\u002Fspan>\n            <span class=\"chip chip-red\">Secret scan blocks commit on any match<\u002Fspan>\n            <span class=\"chip chip-red\">Hard-coded model IDs in product code fail CI<\u002Fspan>\n            <span class=\"chip chip-red\">LLM output not passing the typed schema gate blocked before side effect<\u002Fspan>\n            <span class=\"chip chip-red\">Tier 3 / 4 tools dispatched without a HITL control blocked by the orchestrator<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Process Rules (pre-flight + promotion gates)<\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"chips\">\n            <span class=\"chip chip-red\">No code without an approved requirement<\u002Fspan>\n            <span class=\"chip chip-red\">No /session-start skipping — Stop hook nags<\u002Fspan>\n            <span class=\"chip chip-red\">No new top-level workstream without an architecture ADR<\u002Fspan>\n            <span class=\"chip chip-red\">No promotion-stage skipping (dev→test→staging→main)<\u002Fspan>\n            <span class=\"chip chip-red\">No PII sent to third-party AI vendors<\u002Fspan>\n            <span class=\"chip chip-red\">No paraphrasing of context packs (breaks the prompt cache)<\u002Fspan>\n            <span class=\"chip chip-red\">No AI signature in commit messages<\u002Fspan>\n            <span class=\"chip chip-red\">Hotfix must back-merge to all lower branches within 24 hours<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================================================\n     PANEL 2: AGENTIC SYSTEM ARCHITECTURE\n     ======================================================== -->\n<section class=\"tab-panel\" id=\"panel-2\" role=\"tabpanel\">\n  <div class=\"section-header\">\n    <div class=\"section-title\">Agentic System Architecture<\u002Fdiv>\n    <div class=\"section-sub\">A two-layer agent mesh — orchestration + pluggable workstreams — wired with a plan–execute–critique loop, typed tools, HITL tiers, cost governance, eval gates, and a self-improvement loop.<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Layer 1 — Orchestration Agents (workspace root)<\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-bottom:.75rem\">All orchestration agents live at <code>.agent/agents/<\u002Fcode> in the workspace root. Subagents do not inherit conversation history; the orchestrator passes context explicitly via context packs at <code>.agent/context-packs/&lt;issue-id&gt;/context.md<\u002Fcode>. A reasoning model is routed for decision-making; a fast model for quality gates and coordination.<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">orchestrator <span class=\"chip chip-navy\" style=\"font-size:.65rem\">reasoning<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Single entry point. Reads the issue, runs pre-flight, classifies workstream(s), builds the context pack, dispatches engineers and fans out parallel tasks. Writes to context-packs only — never touches product source or merges.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">architect <span class=\"chip chip-navy\" style=\"font-size:.65rem\">reasoning<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Cross-workstream design authority. Produces ADRs and sequencing plans. Surfaces 2–3 options with cost, risk, and reversibility before recommending one. Never writes implementation code or approves its own ADR.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">business-analyst <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Requirements gatekeeper. Triggered when code is requested without a documented requirement. Drafts STORY / FR / NFR artefacts and waits for explicit human approval. Never writes product code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">product-analyst <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Specification writer. Turns vague issues into implementation-ready specs with edge cases, data shapes, and a test list. Posts the spec as a comment; stops before writing code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">planner <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Decomposes a spec into ordered, independent tasks with explicit dependencies, so the orchestrator can fan them out. Emits the plan artefact the human approves.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">code-reviewer <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">AI code’s first reviewer. Checklist focused on AI-specific failure modes: silent fallbacks, dead error handling, spurious abstractions, missing tests, drift from acceptance criteria. Never mutates code.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">security-reviewer <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Security gatekeeper. OWASP top-10 + AI-specific patterns (prompt injection, over-privileged tools, credentials in prompt). Blocks <code>/handoff<\u002Fcode> on any open High or Critical without explicit human sign-off.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">qa-engineer <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Adversarial tester. 8-phase structure: happy path, negative, boundary, state/flow, integration, regression, a11y, security. Never weakens an assertion to make CI green; never defaults a result to passed.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--purple)\">\n        <div class=\"card-title\">critic / evaluator <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\"><strong>Loop closer.<\u002Fstrong> Scores executor output against acceptance criteria and the eval rubric, returns a structured verdict, and re-dispatches the executor until green — the autonomous inner loop runs without a human.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--purple)\">\n        <div class=\"card-title\">cost-governor <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\"><strong>Budget authority.<\u002Fstrong> Tracks per-call, per-task, and per-tenant spend; enforces ceilings; trips the circuit breaker and surfaces to the HITL queue when a budget is exceeded.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">docs-writer <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Technical writer. Updates README, CHANGELOG, in-code headers, and docs for every behaviour-changing diff. Produces the PR description that <code>/handoff<\u002Fcode> packages. Documents what shipped, not what was hoped for.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">release-coordinator <span class=\"chip chip-slate\" style=\"font-size:.65rem\">fast<\u002Fspan><\u002Fdiv>\n        <div class=\"card-body\">Multi-repo release sequencer. Builds a dependency graph across dependent PRs, verifies each passes independently, recommends merge order, advances pins, and drafts consolidated release notes. Never merges.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Layer 2 — Workstream Engineer Agents (pluggable, per submodule)<\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-bottom:.75rem\">Each workstream agent is scoped to its own submodule root with a strict tool set (~5 tools per agent — multi-agent reliability degrades beyond that). Workstreams are <strong>pluggable<\u002Fstrong>: scaffold a new one from the workstream template, drop in its agent + skills, register it, and the orchestrator routes to it. Below is the default starter set — rename, remove, or add to fit your domain.<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\" style=\"border-top:3px solid var(--orange)\">\n        <div class=\"card-title\">backend-engineer<\u002Fdiv>\n        <div class=\"card-body\">Services, APIs, business logic, data access. Typed contracts at the boundary; idempotent mutations. Tools: Read, Edit, Write, Bash, Grep.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\">\n        <div class=\"card-title\">frontend-engineer<\u002Fdiv>\n        <div class=\"card-body\">UI components, routing, state, accessibility. Default to server components; no data-fetch side effects in view code; no new dependency without an ADR.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--green)\">\n        <div class=\"card-title\">data-engineer<\u002Fdiv>\n        <div class=\"card-body\">Schemas, migrations, pipelines, ETL. Reversible migrations with a rollback path per change; schema changes treated as public contracts.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--slate)\">\n        <div class=\"card-title\">platform-engineer<\u002Fdiv>\n        <div class=\"card-body\">IaC, environments, deploy config, CI wiring. Plan-before-apply; no drift; every change traceable to an ADR.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--amber)\">\n        <div class=\"card-title\">integration-engineer<\u002Fdiv>\n        <div class=\"card-body\">Third-party and internal integrations: auth/SSO, eventing, webhooks, vendor SDKs. Reads external systems; writes through typed, idempotent adapters.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--purple)\">\n        <div class=\"card-title\">ml-engineer<\u002Fdiv>\n        <div class=\"card-body\">Model integration, prompt/agent assets, eval authoring. Owns the eval suite for any AI feature it ships; no model behaviour without a golden case.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:.75rem\">Subagents have restricted tool sets and never write outside their repo. Cross-cutting roles (orchestrator, architect, release-coordinator) carry broader access by design. Need more tools for a task? Spawn a second agent and pass context explicitly — don’t widen one agent’s surface.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">The Plan → Execute → Critique Loop<\u002Fdiv>\n    <div class=\"flow-row\" style=\"justify-content:center;margin:.5rem 0 1rem\">\n      <div class=\"chip chip-navy\" style=\"padding:.55rem 1.1rem;font-size:.85rem\">PLANNER<br><small>decompose · sequence<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\" style=\"padding:.55rem 1.1rem;font-size:.85rem\">EXECUTOR<br><small>implement · verify<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-purple\" style=\"padding:.55rem 1.1rem;font-size:.85rem\">CRITIC<br><small>score vs. criteria<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">↻<\u002Fspan>\n      <div class=\"chip chip-green\" style=\"padding:.55rem 1.1rem;font-size:.85rem\">GREEN → PR<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\"><div class=\"card-title\">Bounded retries<\u002Fdiv><div class=\"card-body\">The loop has a max-iteration ceiling and a per-task cost ceiling. On exhaustion it stops and surfaces a structured failure to the HITL queue — it never ships a red result or loosens a test to pass.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Critic independence<\u002Fdiv><div class=\"card-body\">The critic reads only acceptance criteria, the eval rubric, and the diff — never the executor’s reasoning. Findings must be concrete; \"looks fine\" is not a valid verdict.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Deterministic boundaries<\u002Fdiv><div class=\"card-body\">The loop is non-deterministic; its <em>effects<\u002Fem> are not. Every side effect goes through a typed, idempotent, tier-tagged tool, so a retry is safe and replayable.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Tool Design Principles — Every Tool Exposed to an Agent<\u002Fdiv>\n    <div class=\"grid-4\">\n      <div class=\"card\"><div class=\"card-title\">Single-Purpose<\u002Fdiv><div class=\"card-body\">One verb, one resource. <code style=\"font-size:.75rem\">create_draft<\u002Fcode> not <code style=\"font-size:.75rem\">manage<\u002Fcode>. Tool scope is the blast-radius limit.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Strongly Typed<\u002Fdiv><div class=\"card-body\">Typed input + typed output (Pydantic / Zod). Schema is the contract. Inputs validated before the call; outputs after. Reject malformed; never coerce silently.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Self-Describing<\u002Fdiv><div class=\"card-body\">The docstring IS the description the model sees. Treat it as production prose. A bad docstring is a bad reasoning input.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Failure-Aware<\u002Fdiv><div class=\"card-body\">Returns a structured error <code style=\"font-size:.72rem\">{ ok:false, error }<\u002Fcode>. Never raises into the agent loop. Errors are data the agent reasons over.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Logged<\u002Fdiv><div class=\"card-body\">Every call emits <code style=\"font-size:.72rem\">tool.call.requested<\u002Fcode> + <code style=\"font-size:.72rem\">tool.call.completed<\u002Fcode> span events. Missing observability = blocked release gate.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Idempotent<\u002Fdiv><div class=\"card-body\">Mutating tools require an <code style=\"font-size:.72rem\">idempotency_key<\u002Fcode>. The receiver de-duplicates; retries return the original result, never re-execute.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Tier-Tagged<\u002Fdiv><div class=\"card-body\">Every schema carries its blast-radius tier (1–4). The orchestrator refuses to dispatch Tier 3/4 without the matching HITL control active.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Max 5 Tools / Agent<\u002Fdiv><div class=\"card-body\">Reliability degrades measurably past 5 tools per agent. Need more? Spawn a second agent and pass context via a context pack.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">HITL Blast-Radius Tiers<\u002Fdiv>\n    <table class=\"tier-table\">\n      <thead><tr><th>Tier<\u002Fth><th>Examples<\u002Fth><th>Who executes<\u002Fth><th>Required controls<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><span class=\"chip chip-green\">1 Read-only<\u002Fspan><\u002Ftd><td>search, query, summarise<\u002Ftd><td>AI (80%)<\u002Ftd><td>Tracing only<\u002Ftd><\u002Ftr>\n        <tr><td><span class=\"chip chip-amber\">2 Reversible<\u002Fspan><\u002Ftd><td>create draft, stage change, queue job<\u002Ftd><td>AI (80%)<\u002Ftd><td>Tracing + audit trail<\u002Ftd><\u002Ftr>\n        <tr><td><span class=\"chip chip-orange\">3 Irreversible<\u002Fspan><\u002Ftd><td>publish, send email, charge, delete<\u002Ftd><td>Human (20%)<\u002Ftd><td>Tracing + audit + HITL approval + rate limit<\u002Ftd><\u002Ftr>\n        <tr><td><span class=\"chip chip-red\">4 Privileged<\u002Fspan><\u002Ftd><td>admin action, schema change, secret rotation<\u002Ftd><td>Human (20%)<\u002Ftd><td>Multi-party approval + circuit breaker<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Cost Discipline + Model Routing<\u002Fdiv>\n    <div class=\"grid-2\">\n      <div class=\"card\">\n        <div class=\"card-title\">Cost Ceilings (Three Levels)<\u002Fdiv>\n        <div class=\"card-body\">\n          <table class=\"data-table\" style=\"margin-top:.25rem\">\n            <thead><tr><th>Ceiling<\u002Fth><th>Scope<\u002Fth><th>Action on Trip<\u002Fth><\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr><td>Per-call<\u002Ftd><td>Single LLM request<\u002Ftd><td>Reject before sending (prompt too large)<\u002Ftd><\u002Ftr>\n              <tr><td>Per-task<\u002Ftd><td>Single agent run end-to-end<\u002Ftd><td>Hard stop; surface to HITL approval queue<\u002Ftd><\u002Ftr>\n              <tr><td>Per-tenant<\u002Ftd><td>All calls for a tenant / programme<\u002Ftd><td>Circuit breaker trips; HITL UI surfaces the alert<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Routing &amp; Reduction Controls<\u002Fdiv>\n        <div class=\"card-body\">\n          <div class=\"chips\">\n            <span class=\"chip chip-teal\">Smallest model that clears the eval bar, verified by the eval suite<\u002Fspan>\n            <span class=\"chip chip-teal\">Reasoning model for planning / architecture; fast model for gates<\u002Fspan>\n            <span class=\"chip chip-teal\">No hard-coded model IDs — a single resolver routes every call<\u002Fspan>\n            <span class=\"chip chip-teal\">Prompt caching (byte-identical prefix required for a cache hit)<\u002Fspan>\n            <span class=\"chip chip-teal\">Tool-result cache (same deterministic input = cached output)<\u002Fspan>\n            <span class=\"chip chip-teal\">Every call tagged: agent_id + task_type + tenant_id<\u002Fspan>\n            <span class=\"chip chip-amber\">No PII sent to third-party AI vendors<\u002Fspan>\n            <span class=\"chip chip-red\">Treat the LLM as untrusted with respect to secrets<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Eval Suite — The Regression Suite for Agents<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\"><div class=\"card-title\">Golden Suite<\u002Fdiv><div class=\"card-body\">Representative happy-path cases with known inputs and expected outputs. 100% pass required at the test→staging gate. Every new agent behaviour needs a new golden case before it ships.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Adversarial Suite<\u002Fdiv><div class=\"card-body\">Boundary inputs, malformed payloads, missing fields, cost-explosion triggers. 100% pass required. The eval suite is the production agents’ regression suite.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Red-Team Suite <span class=\"chip chip-purple\" style=\"font-size:.6rem\">advanced<\u002Fspan><\u002Fdiv><div class=\"card-body\">Prompt-injection, jailbreak, tool-abuse, and data-exfiltration probes run on every agent change. Any successful exploit is a blocking finding — the agent does not ship until it’s closed.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Self-Improvement Loop — Continuous Learning<\u002Fdiv>\n    <div class=\"flow-row\" style=\"margin-bottom:.75rem\">\n      <div class=\"chip chip-teal\">Observe session (hooks)<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\">Record atomic instinct + confidence (0.0–1.0)<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-amber\">HUMAN validates<\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-green\">Confidence ≥ threshold → graduate to skill / command / agent<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\">The learning loop is <strong>project-scoped<\u002Fstrong> to prevent cross-repo contamination, and human-gated before any instinct graduates into the shared capability library. This is how the kit gets faster the longer a team runs it — the patterns a workstream discovers become first-class, reusable capabilities.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">MCP Server Topology — Committed in Every Repo<\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-bottom:.75rem\">Every repo (workspace root + submodules) ships a committed <code>.mcp.json<\u002Fcode> loaded automatically at session start. No manual configuration after clone.<\u002Fdiv>\n    <div class=\"grid-4\">\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\"><div class=\"card-title\">scm<\u002Fdiv><div class=\"card-body\">Read/write issues, PRs, and projects across workstream repos. Authenticated via an access-token env var. Used by orchestrator, release-coordinator, and the handoff / cross-repo skills.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\"><div class=\"card-title\">filesystem<\u002Fdiv><div class=\"card-body\">Workspace-scoped file access. Resolves to the session’s project dir so it is always scoped to the repo the session is rooted in — workspace or submodule.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--teal)\"><div class=\"card-title\">live-docs<\u002Fdiv><div class=\"card-body\">Live library documentation on demand. Fetches current docs for any framework or SDK, preventing hallucinated API signatures from stale training data.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\" style=\"border-top:3px solid var(--green)\"><div class=\"card-title\">code-graph <span class=\"chip chip-green\" style=\"font-size:.6rem\">embeddings<\u002Fspan><\u002Fdiv><div class=\"card-body\">Knowledge-graph server over all repos. Structural queries (callers, dependents, impact radius) + semantic vector search. Returns context a flat file-read cannot.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Developer Toolbox — Token Efficiency Architecture<\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-bottom:.75rem\">Every tool below is wired into <code>settings.json<\u002Fcode> allow-lists across all repos and documented in the workspace <code>AGENTS.md<\u002Fcode>. The lookup priority is enforced: <strong>code-graph first, AST search second, grep/Read last resort.<\u002Fstrong><\u002Fdiv>\n    <table class=\"data-table\">\n      <thead><tr><th>Tool<\u002Fth><th>Purpose<\u002Fth><th>Token impact<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><code>code-graph<\u002Fcode><\u002Ftd><td>Knowledge graph over all repos. Callers, dependents, impact radius, cross-repo search, semantic similarity.<\u002Ftd><td><span class=\"chip chip-green\">~10× fewer tokens<\u002Fspan> vs multi-file reads<\u002Ftd><\u002Ftr>\n        <tr><td><code>ast-search<\u002Fcode><\u002Ftd><td>AST-precise symbol and pattern lookup. Finds callers, definitions, and imports without reading raw file contents.<\u002Ftd><td><span class=\"chip chip-green\">Zero file-read tokens<\u002Fspan> for symbol lookups<\u002Ftd><\u002Ftr>\n        <tr><td><code>output-filter<\u002Fcode><\u002Ftd><td>Global Bash output filter. Strips noise from logs, search results, and CI output before it enters the context window.<\u002Ftd><td><span class=\"chip chip-green\">60–90% savings<\u002Fspan> on Bash output<\u002Ftd><\u002Ftr>\n        <tr><td><code>repo-pack<\u002Fcode><\u002Ftd><td>Packs a repo subtree into a single context file for subagent dispatch. One pack = one reusable token budget.<\u002Ftd><td>Eliminates repeated <code>Read<\u002Fcode> calls for full subtree context<\u002Ftd><\u002Ftr>\n        <tr><td><code>loc-stats<\u002Fcode><\u002Ftd><td>Language and line-count breakdown before starting in an unfamiliar module. Replaces recursive filesystem scans.<\u002Ftd><td>Single fast query vs tokenizing file listings<\u002Ftd><\u002Ftr>\n        <tr><td><code>doc-extract<\u002Fcode><\u002Ftd><td>Intercepts <code>Read<\u002Fcode> on binary docs (PDF, etc.); returns extracted text inline so no binary bytes enter context.<\u002Ftd><td>Extracted text only; graceful fallback to native Read<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================================================\n     PANEL 3: DEVSECOPS ARCHITECTURE\n     ======================================================== -->\n<section class=\"tab-panel\" id=\"panel-3\" role=\"tabpanel\">\n  <div class=\"section-header\">\n    <div class=\"section-title\">DevSecOps Architecture<\u002Fdiv>\n    <div class=\"section-sub\">Quality pipeline, a multi-stage gate matrix, enforcement hooks, supply-chain security, policy-as-code, AI red-teaming, and full observability — security shifted all the way left.<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Test &amp; Quality Taxonomy<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\">\n        <div class=\"card-title\">Test Types (6)<\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chips\">\n          <span class=\"chip chip-teal\">unit-testing<\u002Fspan>\n          <span class=\"chip chip-teal\">functional-testing<\u002Fspan>\n          <span class=\"chip chip-teal\">integration-testing<\u002Fspan>\n          <span class=\"chip chip-teal\">contract-testing<\u002Fspan>\n          <span class=\"chip chip-teal\">bdd-workflow<\u002Fspan>\n          <span class=\"chip chip-teal\">e2e-testing<\u002Fspan>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Regression &amp; Parity (4)<\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chips\">\n          <span class=\"chip chip-purple\">visual-regression<\u002Fspan>\n          <span class=\"chip chip-purple\">content-regression<\u002Fspan>\n          <span class=\"chip chip-purple\">performance-budget<\u002Fspan>\n          <span class=\"chip chip-purple\">eval-suite (agents)<\u002Fspan>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Security &amp; Quality Scans (9)<\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chips\">\n          <span class=\"chip chip-red\">SAST<\u002Fspan>\n          <span class=\"chip chip-red\">secret-scanning<\u002Fspan>\n          <span class=\"chip chip-red\">SCA / dependency audit<\u002Fspan>\n          <span class=\"chip chip-red\">IaC scan<\u002Fspan>\n          <span class=\"chip chip-red\">container scan<\u002Fspan>\n          <span class=\"chip chip-red\">license compliance<\u002Fspan>\n          <span class=\"chip chip-red\">accessibility<\u002Fspan>\n          <span class=\"chip chip-red\">broken-links<\u002Fspan>\n          <span class=\"chip chip-red\">lint + format + typecheck<\u002Fspan>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Gate Matrix by Promotion Stage<\u002Fdiv>\n    <table class=\"data-table\">\n      <thead>\n        <tr><th>Gate<\u002Fth><th>feature→dev<\u002Fth><th>dev→test<\u002Fth><th>test→staging<\u002Fth><th>staging→main<\u002Fth><\u002Ftr>\n      <\u002Fthead>\n      <tbody>\n        <tr><td>Lint + format + typecheck<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>SAST<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Secret scan<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Pre-commit hooks<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Unit tests<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>BDD scenarios<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Integration + contract tests<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>SCA / dependency audit<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Build artefacts<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>AI code-reviewer<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>AI security-reviewer<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Policy-as-code (OPA) check<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Human reviewer (general)<\u002Ftd><td>1<\u002Ftd><td>1<\u002Ftd><td>1<\u002Ftd><td>1<\u002Ftd><\u002Ftr>\n        <tr><td>Deploy to env + smoke<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>E2E suite<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Visual + content regression<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Accessibility + broken-links<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Performance budget<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Eval suite (golden + adversarial + red-team)<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>IaC + container scan<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Human security reviewer<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>1<\u002Ftd><td>1<\u002Ftd><\u002Ftr>\n        <tr><td>SBOM + SLSA provenance + artefact signing<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n        <tr><td>Release manager<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>1<\u002Ftd><\u002Ftr>\n        <tr><td>CHANGELOG + release notes<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>—<\u002Ftd><td>X<\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Enforcement Hooks (every agent session)<\u002Fdiv>\n    <div class=\"grid-4\">\n      <div class=\"card\"><div class=\"card-title\">pre-tool-edit<\u002Fdiv><div class=\"card-body\">Blocks new source files that lack a one-line purpose header (<code>#<\u002Fcode>, <code>//<\u002Fcode>, <code>/*<\u002Fcode>, <code>\"\"\"<\u002Fcode>). Skips markdown, JSON, YAML, config. Existing files pass through.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">pre-tool-bash<\u002Fdiv><div class=\"card-body\">Blocks <code>push --force<\u002Fcode>, <code>reset --hard<\u002Fcode>, <code>commit --no-verify<\u002Fcode>, and <code>merge<\u002Fcode>. On commit, runs the secret scanner against staged files and blocks on any match.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">post-tool-edit<\u002Fdiv><div class=\"card-body\">Runs the workstream-local linter/formatter on the saved file (best-effort, never blocks the session). Keeps the diff clean before it reaches review.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">policy-gate <span class=\"chip chip-purple\" style=\"font-size:.6rem\">advanced<\u002Fspan><\u002Fdiv><div class=\"card-body\">Evaluates the change against policy-as-code (OPA/Rego) bundles: forbidden licenses, banned APIs, data-residency, tier rules. A failed policy is a blocking finding.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Supply-Chain Security <span class=\"chip chip-purple\" style=\"font-size:.65rem\">advanced<\u002Fspan><\u002Fdiv>\n    <div class=\"grid-4\">\n      <div class=\"card\"><div class=\"card-title\">SBOM<\u002Fdiv><div class=\"card-body\">A Software Bill of Materials (CycloneDX / SPDX) is generated and attached to every release artefact — full dependency transparency for audit and incident response.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">SLSA Provenance<\u002Fdiv><div class=\"card-body\">Build provenance attestation records how, where, and from what source each artefact was built — tamper-evident, verifiable in the deploy gate.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Artefact Signing<\u002Fdiv><div class=\"card-body\">Releases are cryptographically signed (keyless / Sigstore-style); deploy refuses any unsigned or signature-mismatched artefact.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Pinned &amp; Audited Deps<\u002Fdiv><div class=\"card-body\">Lockfiles pinned by hash; automated dependency-update PRs run the full gate; SCA blocks High/Critical advisories at every stage.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">AI Red-Teaming &amp; Runtime Safety <span class=\"chip chip-purple\" style=\"font-size:.65rem\">advanced<\u002Fspan><\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\"><div class=\"card-title\">Prompt-Injection Probes<\u002Fdiv><div class=\"card-body\">A red-team eval set runs injection, jailbreak, and instruction-override payloads against every agent change. Any success is a blocking finding before the test→staging gate.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Least-Privilege Tools<\u002Fdiv><div class=\"card-body\">Agents get the minimum tool set for the task. Tier 3/4 tools are unavailable unless the matching HITL control is wired and active. The LLM is treated as untrusted toward secrets.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Output Schema Gate<\u002Fdiv><div class=\"card-body\">No LLM output reaches a side effect without passing a typed schema gate. Malformed output is rejected, not coerced — the safety boundary is mechanical, not advisory.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Observability Stack<\u002Fdiv>\n    <div class=\"chips\">\n      <span class=\"chip chip-teal\">OpenTelemetry traces (every agent run)<\u002Fspan>\n      <span class=\"chip chip-teal\">tool.call.requested + tool.call.completed span events<\u002Fspan>\n      <span class=\"chip chip-green\">Metrics pipeline (local compose; export to any backend)<\u002Fspan>\n      <span class=\"chip chip-green\">Dashboards (latency, pass-rate, retries, cost)<\u002Fspan>\n      <span class=\"chip chip-purple\">Eval dashboard — golden / adversarial / red-team pass-rate over time<\u002Fspan>\n      <span class=\"chip chip-amber\">Per-tenant cost ceiling with circuit breaker<\u002Fspan>\n      <span class=\"chip chip-amber\">Per-call cost ceiling (rejects too-large prompts)<\u002Fspan>\n      <span class=\"chip chip-red\">HITL approval queue (tier 3 + 4 actions)<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================================================\n     PANEL 4: DEVELOPMENT ARCHITECTURE\n     ======================================================== -->\n<section class=\"tab-panel\" id=\"panel-4\" role=\"tabpanel\">\n  <div class=\"section-header\">\n    <div class=\"section-title\">Development Architecture<\u002Fdiv>\n    <div class=\"section-sub\">Workspace topology, the branch &amp; promotion model, context-engineering primitives, and the scaffolds that make a new workstream a five-minute task.<\u002Fdiv>\n    <div class=\"divider\"><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Workspace + Submodule Topology<\u002Fdiv>\n    <div class=\"layer layer-cms\">\n      <div class=\"layer-label\">Workspace Root<\u002Fdiv>\n      <div class=\"chips\">\n        <span class=\"chip chip-teal\">.agent/ — shared agents, skills, commands, hooks, rules, policies<\u002Fspan>\n        <span class=\"chip chip-teal\">specs/ — SPEC.md + per-feature specs (source of truth)<\u002Fspan>\n        <span class=\"chip chip-teal\">requirements/ — STORY / FR / NFR artefacts<\u002Fspan>\n        <span class=\"chip chip-teal\">docs/ — ADRs, architecture, runbooks<\u002Fspan>\n        <span class=\"chip chip-slate\">infra/ — Terraform / IaC<\u002Fspan>\n        <span class=\"chip chip-slate\">.github/ — Actions, CODEOWNERS, branch-protection<\u002Fspan>\n        <span class=\"chip chip-slate\">eval/ — golden + adversarial + red-team suites<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"grid-4\" style=\"margin-top:.75rem\">\n      <div class=\"card\"><div class=\"card-title\">backend (submodule)<\u002Fdiv><div class=\"card-body\">Services + APIs<br>Typed contracts<br>Own <code>.agent/<\u002Fcode> symlinked from root<br>Own test + eval suites<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">frontend (submodule)<\u002Fdiv><div class=\"card-body\">UI + routing + state<br>Server-first components<br>Visual + a11y regression<br>E2E suite<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">data / platform (submodule)<\u002Fdiv><div class=\"card-body\">Schemas + migrations<br>IaC + deploy config<br>Reversible changes<br>Contract tests<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">integrations (submodule)<\u002Fdiv><div class=\"card-body\">Per-vendor adapters<br>Auth / eventing / webhooks<br>Reads external, writes typed<br>Idempotent boundaries<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:.75rem\">The workspace is the single source of <code>.agent/<\u002Fcode> assets; a <code>sync-agent-assets<\u002Fcode> script symlinks agents, skills, and rules down into each submodule, so a developer who opens a submodule directly still gets the full guardrail set. Rules are also <code>@<\u002Fcode>-imported into each submodule’s <code>AGENTS.md<\u002Fcode>.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Branch &amp; Promotion Model<\u002Fdiv>\n    <div class=\"flow-row\">\n      <div class=\"chip chip-slate\" style=\"padding:.5rem 1rem;font-size:.82rem\">feature/*<br><small>from dev only<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-green\" style=\"padding:.5rem 1rem;font-size:.82rem\">dev<br><small>Integration trunk<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-amber\" style=\"padding:.5rem 1rem;font-size:.82rem\">test<br><small>QA validation<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-purple\" style=\"padding:.5rem 1rem;font-size:.82rem\">staging<br><small>Prod-equivalent<\u002Fsmall><\u002Fdiv>\n      <span class=\"arrow-right\">→<\u002Fspan>\n      <div class=\"chip chip-teal\" style=\"padding:.5rem 1rem;font-size:.82rem\">main<br><small>Production vN.N.N<\u002Fsmall><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"note-box\" style=\"margin-top:1rem\">Promotion is strictly directional: <code>dev → test → staging → main<\u002Fcode>. No skipping. Feature branches cut from <code>dev<\u002Fcode> only; hotfix from <code>main<\u002Fcode> / <code>staging<\u002Fcode> with a reduced gate and a mandatory back-merge to all lower branches within 24 hours. Features squash-merge; promotions merge-commit. <strong>Every merge is a human action.<\u002Fstrong><\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"grid-2\">\n    <div class=\"card\">\n      <div class=\"card-title\">Branch Naming Conventions<\u002Fdiv>\n      <div class=\"card-body\">\n        <table class=\"data-table\" style=\"margin-top:.5rem\">\n          <thead><tr><th>Type<\u002Fth><th>Pattern<\u002Fth><th>Source<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>Feature<\u002Ftd><td>issue-&lt;num&gt;-&lt;slug&gt;<\u002Ftd><td>dev<\u002Ftd><\u002Ftr>\n            <tr><td>Bugfix<\u002Ftd><td>fix-&lt;num&gt;-&lt;slug&gt;<\u002Ftd><td>dev<\u002Ftd><\u002Ftr>\n            <tr><td>Chore<\u002Ftd><td>chore-&lt;slug&gt;<\u002Ftd><td>dev<\u002Ftd><\u002Ftr>\n            <tr><td>Promotion<\u002Ftd><td>promote-&lt;from&gt;-to-&lt;to&gt;-&lt;date&gt;<\u002Ftd><td>source branch<\u002Ftd><\u002Ftr>\n            <tr><td>Hotfix<\u002Ftd><td>hotfix-&lt;num&gt;-&lt;slug&gt;<\u002Ftd><td>main / staging<\u002Ftd><\u002Ftr>\n            <tr><td>Relea
