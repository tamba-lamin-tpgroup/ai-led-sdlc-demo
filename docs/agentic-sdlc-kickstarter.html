se<\u002Ftd><td>release-vN.N.N<\u002Ftd><td>staging<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"card\">\n      <div class=\"card-title\">Commit Conventions<\u002Fdiv>\n      <div class=\"card-body\">\n        <table class=\"data-table\" style=\"margin-top:.5rem\">\n          <thead><tr><th>Element<\u002Fth><th>Rule<\u002Fth><\u002Ftr><\u002Fthead>\n          <tbody>\n            <tr><td>Format<\u002Ftd><td>Conventional commits (feat/fix/chore/…)<\u002Ftd><\u002Ftr>\n            <tr><td>Required trailer<\u002Ftd><td><code>Requirement: &lt;id&gt;<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>Reference trailer<\u002Ftd><td><code>Refs:<\u002Fcode> / <code>Closes:<\u002Fcode><\u002Ftd><\u002Ftr>\n            <tr><td>Forbidden<\u002Ftd><td>AI signatures, emojis, icons<\u002Ftd><\u002Ftr>\n            <tr><td>Enforced by<\u002Ftd><td><code>/code-push<\u002Fcode> + promotion-gate coverage check<\u002Ftd><\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\" style=\"margin-top:1.5rem\">\n    <div class=\"diagram-title\">Context Engineering — The Durable Primitives<\u002Fdiv>\n    <div class=\"grid-2\">\n      <div class=\"card\"><div class=\"card-title\">Context Pack<\u002Fdiv><div class=\"card-body\">At <code>.agent/context-packs/&lt;issue-id&gt;/context.md<\u002Fcode>. Written by the orchestrator at dispatch: issue title, requirement ID, workstream routing, edge cases, dependency status, approved plan. Passed <strong>verbatim<\u002Fstrong> to subagents — a byte-identical prefix is required for a prompt-cache hit.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Scope Memories<\u002Fdiv><div class=\"card-body\">At <code>.agent/scope-memories/<\u002Fcode>. Seeded from the spec and decisions log at setup. Gives every agent programme-level facts (scope, decisions, glossary, stakeholder map) without re-reading files in every session.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Session Files<\u002Fdiv><div class=\"card-body\">At <code>.agent/sessions/&lt;date-time&gt;-&lt;workstream&gt;-&lt;slug&gt;.md<\u002Fcode>. The single durable artefact between invocations. Loaded by the session-start hook; finalised by <code>/session-end<\u002Fcode>; the Stop hook nags if left open.<\u002Fdiv><\u002Fdiv>\n      <div class=\"card\"><div class=\"card-title\">Knowledge Graph<\u002Fdiv><div class=\"card-body\">A code-graph index over all repos (nodes, edges, embeddings). Structural + semantic queries replace multi-file reads — the first-line lookup for callers, dependents, and impact radius before any agent reads raw source.<\u002Fdiv><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Scaffolds &amp; Bootstrap — A New Workstream in Minutes<\u002Fdiv>\n    <div class=\"grid-3\">\n      <div class=\"card\">\n        <div class=\"card-title\">Templates<\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chips\">\n          <span class=\"chip chip-teal\">workstream-template<\u002Fspan>\n          <span class=\"chip chip-teal\">agent-template<\u002Fspan>\n          <span class=\"chip chip-teal\">skill-template<\u002Fspan>\n          <span class=\"chip chip-teal\">command-template<\u002Fspan>\n          <span class=\"chip chip-teal\">eval-case-template<\u002Fspan>\n        <\u002Fdiv><div style=\"margin-top:.4rem\">Fork a template, register the workstream, and the orchestrator routes to it — no core changes.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Bootstrap Scripts (bin/)<\u002Fdiv>\n        <div class=\"card-body\">\n          <table class=\"data-table\" style=\"margin-top:.25rem\">\n            <tbody>\n              <tr><td><code>onboard<\u002Fcode><\u002Ftd><td>git config, submodules, tooling install<\u002Ftd><\u002Ftr>\n              <tr><td><code>wire-submodules<\u002Fcode><\u002Ftd><td>init + sync all submodules after clone<\u002Ftd><\u002Ftr>\n              <tr><td><code>sync-agent-assets<\u002Fcode><\u002Ftd><td>symlink <code>.agent/<\u002Fcode> down into submodules<\u002Ftd><\u002Ftr>\n              <tr><td><code>configure-git<\u002Fcode><\u002Ftd><td>hooks, signing, branch protection<\u002Ftd><\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"card\">\n        <div class=\"card-title\">Slash Commands (starter set)<\u002Fdiv>\n        <div class=\"card-body\"><div class=\"chips\">\n          <span class=\"chip chip-slate\">/orchestrate<\u002Fspan>\n          <span class=\"chip chip-slate\">/issue-start<\u002Fspan>\n          <span class=\"chip chip-slate\">/issue-create<\u002Fspan>\n          <span class=\"chip chip-slate\">/code-push<\u002Fspan>\n          <span class=\"chip chip-slate\">/handoff<\u002Fspan>\n          <span class=\"chip chip-slate\">/pr-update<\u002Fspan>\n          <span class=\"chip chip-slate\">/review-gate<\u002Fspan>\n          <span class=\"chip chip-slate\">/promote<\u002Fspan>\n          <span class=\"chip chip-slate\">/cross-repo-pr<\u002Fspan>\n          <span class=\"chip chip-slate\">/session-start · -update · -end<\u002Fspan>\n          <span class=\"chip chip-slate\">/status · /dev-start<\u002Fspan>\n        <\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"diagram-area\">\n    <div class=\"diagram-title\">Adoption Path — From Clone to L3 Autonomy<\u002Fdiv>\n    <table class=\"data-table\">\n      <thead><tr><th>Stage<\u002Fth><th>Focus<\u002Fth><th>Exit signal<\u002Fth><th>Autonomy<\u002Fth><\u002Ftr><\u002Fthead>\n      <tbody>\n        <tr><td><strong>1 · Stand up<\u002Fstrong><\u002Ftd><td>Clone, run bootstrap, wire MCP servers + hooks, author <code>SPEC.md<\u002Fcode> and first requirements.<\u002Ftd><td>Pre-flight passes on a real issue; session lifecycle in use.<\u002Ftd><td><span class=\"chip chip-slate\">L1<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>2 · First loop<\u002Fstrong><\u002Ftd><td>Run one workstream end to end: plan–execute–critique, verification-loop, /handoff, human review-gate.<\u002Ftd><td>A spec-traceable PR merged through the full gate matrix.<\u002Ftd><td><span class=\"chip chip-teal\">L2<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>3 · Harden<\u002Fstrong><\u002Ftd><td>Stand up the eval suite, supply-chain gates, policy-as-code, and observability dashboards.<\u002Ftd><td>100% eval pass gating promotion; signed artefacts with SBOM.<\u002Ftd><td><span class=\"chip chip-teal\">L2<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>4 · Scale out<\u002Fstrong><\u002Ftd><td>Add workstreams from templates; enable parallel fan-out + cross-repo coordination.<\u002Ftd><td>Multiple concurrent PRs sequenced by the release-coordinator.<\u002Ftd><td><span class=\"chip chip-teal-dim\" style=\"color:#fff;background:var(--teal-dim)\">L3<\u002Fspan><\u002Ftd><\u002Ftr>\n        <tr><td><strong>5 · Compound<\u002Fstrong><\u002Ftd><td>Turn on continuous-learning; graduate instincts into shared skills; tune model routing on eval cost data.<\u002Ftd><td>Velocity rises sprint over sprint; cost per task trends down.<\u002Ftd><td><span style=\"background:var(--teal-dim);color:#fff\" class=\"chip\">L3+<\u002Fspan><\u002Ftd><\u002Ftr>\n      <\u002Ftbody>\n    <\u002Ftable>\n    <p style=\"font-size:.72rem;color:var(--gray-600);margin-top:.5rem\">Autonomy is earned per workstream: a level unlocks only once its eval suite, observability, and HITL controls are proven. The 80/20 human-judgement split holds at every stage.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ========================================================\n     \"WHAT'S NEW\" MODAL\n     ======================================================== -->\n<div class=\"modal-overlay\" id=\"modal-release\" onclick=\"if(event.target===this)this.classList.remove('open')\">\n  <div class=\"modal-box\">\n    <button class=\"modal-close\" onclick=\"document.getElementById('modal-release').classList.remove('open')\" aria-label=\"Close\">×<\u002Fbutton>\n    <div class=\"modal-title\">What’s New — Kickstarter Blueprint<\u002Fdiv>\n    <div class=\"release-entry\">\n      <div class=\"release-version\">v1.0.0 — Reference Blueprint<\u002Fdiv>\n      <ul class=\"release-list\">\n        <li>Vendor-neutral, productized accelerator distilled from a production AI-led delivery programme — all client, project, and platform specifics removed.<\u002Fli>\n        <li><strong>Spec-first<\u002Fstrong> lifecycle: <code>SPEC.md<\u002Fcode> as the durable source of truth feeding requirements → issues → tasks → spec-traceable PRs.<\u002Fli>\n        <li><strong>Autonomy ladder (L0–L4)<\u002Fstrong> — a per-task autonomy setting that dials up as eval, observability, and HITL controls are proven.<\u002Fli>\n        <li><strong>Plan → Execute → Critique<\u002Fstrong> inner loop with a dedicated critic/evaluator agent + parallel fan-out across workstreams.<\u002Fli>\n        <li><strong>Model routing<\u002Fstrong> via a single resolver (no hard-coded model IDs); a dedicated cost-governor agent owns the three-tier budget ceilings.<\u002Fli>\n        <li><strong>Eval-as-gate<\u002Fstrong>: golden + adversarial + red-team suites as a hard 100%-pass promotion gate.<\u002Fli>\n        <li><strong>DevSecOps deepened<\u002Fstrong>: contract testing, SCA/IaC/container scans, policy-as-code (OPA), SBOM + SLSA provenance + artefact signing, and AI red-teaming.<\u002Fli>\n        <li><strong>Pluggable workstreams<\u002Fstrong> with templates and bootstrap scripts; a documented clone-to-L3 adoption path.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"release-entry\">\n      <div class=\"release-version\">Scope of this blueprint<\u002Fdiv>\n      <ul class=\"release-list\">\n        <li>Four focus areas: <strong>AI-Led SDLC<\u002Fstrong>, <strong>Agentic System Architecture<\u002Fstrong>, <strong>DevSecOps Architecture<\u002Fstrong>, and <strong>Development Architecture<\u002Fstrong>.<\u002Fli>\n        <li>Runtime-agnostic: works with the leading agent CLIs and any model provider; pins to none.<\u002Fli>\n        <li>Everything ships as editable files — fork and shape to your domain.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n\n\n<!-- ========================================================\n     JAVASCRIPT\n     ======================================================== -->\n<script>\nfunction switchTab(index) {\n  var panels = document.querySelectorAll('.tab-panel');\n  var buttons = document.querySelectorAll('.tab-btn');\n  panels.forEach(function(p, i) { p.classList.toggle('active', i === index); });\n  buttons.forEach(function(b, i) {\n    var isActive = i === index;\n    b.classList.toggle('active', isActive);\n    b.setAttribute('aria-selected', isActive ? 'true' : 'false');\n  });\n  buttons[index].scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });\n}\ndocument.querySelector('.tab-nav').addEventListener('keydown', function(e) {\n  var buttons = Array.from(document.querySelectorAll('.tab-btn'));\n  var current = buttons.findIndex(function(b) { return b.classList.contains('active'); });\n  if (e.key === 'ArrowRight') { switchTab((current + 1) % buttons.length); e.preventDefault(); }\n  else if (e.key === 'ArrowLeft') { switchTab((current - 1 + buttons.length) % buttons.length); e.preventDefault(); }\n  else if (e.key === 'Escape') { document.getElementById('modal-release').classList.remove('open'); }\n});\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
