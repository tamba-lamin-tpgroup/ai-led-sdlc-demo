# Accessibility gate (SPEC §15 a11y.yml). Builds the app and runs axe-core via
# Playwright across the five smoke routes; fails on serious/critical
# violations. Runs in salone-explorer/.
name: a11y

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

defaults:
  run:
    working-directory: salone-explorer

permissions:
  contents: read

jobs:
  axe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: salone-explorer/package-lock.json
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run build:prerender
      - run: npm run test:a11y
