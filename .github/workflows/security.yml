# SAST + dependency audit (SPEC §15 security.yml). Semgrep OWASP/JS/TS/React/
# secrets rulesets, plus npm audit. Per ADR 0002 the blocking audit is scoped
# to production dependencies (what ships); the full audit runs informationally.
name: security

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  semgrep:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v6
      - run: |
          semgrep scan \
            --config p/owasp-top-ten \
            --config p/javascript \
            --config p/typescript \
            --config p/react \
            --config p/secrets \
            --error \
            salone-explorer/src salone-explorer/scripts

  npm-audit:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: salone-explorer
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: salone-explorer/package-lock.json
      - run: npm ci
      - name: Audit production dependencies (blocking)
        run: npm audit --omit=dev --audit-level=high
      - name: Full audit (informational)
        run: npm audit || true
